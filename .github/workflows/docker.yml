name: ML CI Pipeline

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run Test Cases
        run: pytest

      - name: Build Docker Image
        run: docker build -t ml-devops-demo .

      - name: Run Docker Container
        run: docker run ml-devops-demo